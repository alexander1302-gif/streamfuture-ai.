<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#05050f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Android TV / Smart TV -->
    <meta name="application-name" content="StreamFuture AI" />
    <meta name="description" content="Tu plataforma de streaming futurista con IA" />
    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>StreamFuture AI</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; overflow-x: hidden; background: #05050f; }
      /* Soporte D-pad para TV */
      :focus { outline: 3px solid #6c3bff !important; outline-offset: 3px !important; }
      :focus:not(:focus-visible) { outline: none !important; }
      :focus-visible { outline: 3px solid #6c3bff !important; }
    </style>
  </head>
  <body>
    <noscript>StreamFuture AI requiere JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
